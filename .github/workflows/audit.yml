name: Audit

on:
  pull_request:
    branches:
      - main
      - zowe-v?-lts
      - next
    paths:
      - packages/**
      - package.json
  schedule:
    - cron: '0 10 * * *'

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0

    - name: Use Node.js LTS
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: lts/*

    - name: Check Vulnerabilities
      run: npm audit --workspaces --omit=dev --audit-level=moderate
