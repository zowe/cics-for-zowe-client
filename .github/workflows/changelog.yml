name: Changelog

on:
  pull_request:
    branches:
      - main
      - zowe-v?-lts
    paths:
      - packages/**

jobs:
  changelog:
    if: ${{ contains( github.event.pull_request.labels.*.name, 'no-changelog') != true }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        fetch-depth: 0

    - name: Check Changelog Updated
      id: checkchangelogupdated
      uses: awharn/check_changelog_action@c55576539feda35872002e76b03da4e61cc4fed7 # v1.1.5
      with:
        header: '## Recent Changes'
        file: 'CHANGELOG.md'
        lerna: true
        ignoreFiles: '__tests__|package.json|package-lock.json|*.md'